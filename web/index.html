<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Road Issue Reporting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./main.js" defer></script>
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <header class="hero">
      <div>
        <p class="eyebrow">Nagpur Civic Tech</p>
        <h1>Crowdsourced Road Issue Reporting System</h1>
        <p class="subtext">Report potholes and hazards with location and image evidence. Track resolution progress in real time.</p>
      </div>
      <div class="status-card">
        <p class="label">Session</p>
        <p id="sessionState">Signed out</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel auth-panel">
        <h2>Account</h2>
        <form id="authForm" class="stack">
          <label>Email</label>
          <input id="email" type="email" required placeholder="name@example.com" />
          <label>Password</label>
          <input id="password" type="password" required minlength="6" placeholder="Minimum 6 characters" />
          <div class="button-row">
            <button type="button" id="signUpBtn">Sign up</button>
            <button type="button" id="signInBtn">Sign in</button>
            <button type="button" id="signOutBtn" class="ghost">Sign out</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <h2>Report Issue</h2>
        <form id="issueForm" class="stack">
          <label>Title</label>
          <input id="title" required minlength="5" maxlength="140" placeholder="Large pothole near bus stand" />
          <label>Description</label>
          <textarea id="description" required minlength="10" maxlength="2000" placeholder="Describe impact, lane, nearby landmark"></textarea>
          <label>Severity</label>
          <select id="severity">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
          <div class="two-col">
            <div>
              <label>Latitude</label>
              <input id="latitude" type="number" step="0.000001" required />
            </div>
            <div>
              <label>Longitude</label>
              <input id="longitude" type="number" step="0.000001" required />
            </div>
          </div>
          <label>Address</label>
          <input id="address" placeholder="Wardha Road, Nagpur" />
          <label>Road image</label>
          <input id="image" type="file" accept="image/png,image/jpeg,image/webp" required />
          <div id="imagePreviewWrap" class="preview-wrap hidden">
            <img id="imagePreview" alt="Selected road preview" />
          </div>
          <div class="progress-wrap">
            <div id="uploadProgressBar" class="progress-bar"></div>
            <p id="uploadProgressText" class="progress-text">Upload progress: 0%</p>
          </div>
          <button type="submit">Submit issue</button>
        </form>
      </section>

      <section class="panel map-panel">
        <h2>Map</h2>
        <div class="button-row">
          <button id="useLocationBtn" type="button" class="ghost">Use my location</button>
          <button id="clearRadiusBtn" type="button" class="ghost">Clear radius filter</button>
        </div>
        <div class="two-col compact">
          <div>
            <label>Filter latitude</label>
            <input id="filterLatitude" type="number" step="0.000001" placeholder="21.1458" />
          </div>
          <div>
            <label>Filter longitude</label>
            <input id="filterLongitude" type="number" step="0.000001" placeholder="79.0882" />
          </div>
        </div>
        <label>Radius in km (optional)</label>
        <input id="radiusKm" type="number" min="0" step="0.5" placeholder="5" />
        <div id="map"></div>
      </section>

      <section class="panel">
        <h2>Issues Feed</h2>
        <div class="feed-controls">
          <select id="statusFilter">
            <option value="all">All statuses</option>
            <option value="reported">reported</option>
            <option value="in_review">in_review</option>
            <option value="resolved">resolved</option>
            <option value="rejected">rejected</option>
          </select>
          <select id="severityFilter">
            <option value="all">All severity</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="critical">critical</option>
          </select>
          <input id="searchFilter" placeholder="Search title or description" />
          <button id="refreshFeedBtn" class="ghost" type="button">Refresh feed</button>
        </div>
        <div id="issuesFeed" class="feed"></div>
      </section>

      <section class="panel admin-panel">
        <h2>Admin Dashboard</h2>
        <button id="loadAdminBtn" class="ghost">Load dashboard</button>
        <pre id="adminStats" class="stats-box">No data yet.</pre>
        <h3>Update Issue Status</h3>
        <form id="adminUpdateForm" class="stack">
          <label>Issue ID</label>
          <input id="adminIssueId" required placeholder="UUID" />
          <label>Status</label>
          <select id="adminStatus" required>
            <option value="reported">reported</option>
            <option value="in_review">in_review</option>
            <option value="resolved">resolved</option>
            <option value="rejected">rejected</option>
          </select>
          <label>Severity</label>
          <select id="adminSeverity">
            <option value="">Keep unchanged</option>
            <option value="low">low</option>
            <option value="medium">medium</option>
            <option value="high">high</option>
            <option value="critical">critical</option>
          </select>
          <label>Admin notes</label>
          <textarea id="adminNotes" placeholder="Progress and verification notes"></textarea>
          <button type="submit">Update issue</button>
        </form>
      </section>
    </main>

    <aside class="toast" id="toast"></aside>
  </body>
</html>
